name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - v1-release

jobs:
  test:
    name: Test and lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag riot-api:${{ github.sha }} .
